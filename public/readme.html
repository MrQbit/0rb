      .markdown-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px;
        background-color: #ffffff;
        border-radius: 12px;
        line-height: 1.8;
      }
      .markdown-content h1 {
        font-size: 32px;
        font-weight: 600;
        margin-bottom: 24px;
        color: #2e2e38;
        border-bottom: 2px solid #e0e0e0;
        padding-bottom: 16px;
      }
      .markdown-content h2 {
        font-size: 24px;
        font-weight: 600;
        margin-top: 32px;
        margin-bottom: 16px;
        color: #2e2e38;
      }
      .markdown-content h3 {
        font-size: 18px;
        font-weight: 600;
        margin-top: 24px;
        margin-bottom: 12px;
        color: #2e2e38;
      }
      .markdown-content p {
        margin-bottom: 16px;
        color: #747480;
      }
      .markdown-content ul,
      .markdown-content ol {
        margin-bottom: 16px;
        margin-left: 24px;
        color: #747480;
      }
      .markdown-content li {
        margin-bottom: 8px;
      }
      .markdown-content code {
        background-color: #f5f5f5;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 14px;
        color: #2e2e38;
      }
      .markdown-content pre {
        background-color: #2e2e38;
        color: #ffffff;
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
        margin-bottom: 16px;
      }
      .markdown-content pre code {
        background-color: transparent;
        padding: 0;
        color: #ffffff;
      }
      .markdown-content a {
        color: #2e2e38;
        text-decoration: underline;
      }
      .markdown-content a:hover {
        color: #1e1e28;
      }
      .markdown-content blockquote {
        border-left: 4px solid #ffe600;
        padding-left: 16px;
        margin: 16px 0;
        color: #747480;
        font-style: italic;
      }
      .markdown-content table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 16px;
      }
      .markdown-content table th,
      .markdown-content table td {
        border: 1px solid #e0e0e0;
        padding: 12px;
        text-align: left;
      }
      .markdown-content table th {
        background-color: #f5f5f5;
        font-weight: 600;
        color: #2e2e38;
      }
      .markdown-content img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        margin: 16px 0;
      }
      .loading {
        text-align: center;
        padding: 48px;
        color: #747480;
      }
    </style>

    <script>
      // Fetch and render README.md using marked.js (standard markdown library)
      fetch('/README.md')
        .then(response => {
          if (!response.ok) {
            throw new Error('README.md not found');
          }
          return response.text();
        })
        .then(markdown => {
          // Render markdown to HTML
          const html = marked.parse(markdown);
          document.getElementById('readme-container').innerHTML = html;
        })
        .catch(error => {
          console.error('Error loading README:', error);
          document.getElementById('readme-container').innerHTML = `
            <div class="loading">
              <h2>Documentation Not Available</h2>
              <p>Unable to load README.md file. Please use the Home link in the breadcrumb navigation above.</p>
            </div>
          `;
