<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>rak00n — sign in</title>
  <link rel="icon" href="/web/assets/rak00n-logo.svg" type="image/svg+xml" />
  <style>
    :root { --nv:#76b900; --nv-dim:#5a8c00; --bg:#0a0d0a; --panel:#121712; --text:#e8f0e0; --muted:#7d897a; }
    * { box-sizing:border-box; }
    body {
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:ui-sans-serif,system-ui,-apple-system,sans-serif; color:var(--text);
      background:radial-gradient(1200px 600px at 50% -10%, rgba(118,185,0,.12), transparent 60%), var(--bg);
    }
    .card { width:min(92vw,380px); background:var(--panel); border:1px solid rgba(118,185,0,.18);
      border-radius:18px; padding:34px 30px; box-shadow:0 24px 60px rgba(0,0,0,.5); }
    .brand { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
    .brand img { width:40px; height:40px; }
    .brand h1 { font-size:22px; margin:0; letter-spacing:.5px; }
    .brand h1 b { color:var(--nv); }
    .sub { color:var(--muted); font-size:13px; margin:6px 0 22px; }
    label { display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; text-transform:uppercase; letter-spacing:.6px; }
    input { width:100%; padding:12px 14px; border-radius:10px; font-size:15px;
      background:#0c100c; border:1px solid rgba(255,255,255,.08); color:var(--text); }
    input:focus { outline:none; border-color:var(--nv); box-shadow:0 0 0 3px rgba(118,185,0,.15); }
    #code { letter-spacing:6px; text-align:center; font-size:22px; }
    button { margin-top:22px; width:100%; padding:12px; border:0; border-radius:10px;
      background:var(--nv); color:#0a0d0a; font-weight:700; font-size:15px; cursor:pointer; transition:background .15s; }
    button:hover { background:var(--nv-dim); }
    button:disabled { opacity:.6; cursor:default; }
    .alt { margin-top:10px; background:#0c100c; color:var(--nv); border:1px solid rgba(118,185,0,.35); }
    .alt:hover { background:rgba(118,185,0,.12); }
    .link { background:none; color:var(--muted); font-weight:500; font-size:13px; margin-top:10px; }
    .link:hover { background:none; color:var(--text); }
    .msg { font-size:13px; margin-top:14px; min-height:18px; }
    .err { color:#ff6b6b; } .ok { color:var(--nv); }
    .hide { display:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/web/assets/rak00n-logo.svg" alt="rak00n" />
      <h1>rak<b>00</b>n</h1>
    </div>
    <p class="sub">Sign in with your email</p>

    <div id="step-email">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" inputmode="email" autofocus placeholder="you@example.com" />
      <button type="button" id="sendBtn">Email me a code</button>
      <button type="button" class="alt" id="sendTgBtn">Send code via Telegram</button>
    </div>

    <div id="step-code" class="hide">
      <label for="code">6-digit code sent via <span id="viaEcho">email</span> to <span id="emailEcho"></span></label>
      <input id="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="••••••" />
      <button type="button" id="verifyBtn">Verify &amp; sign in</button>
      <button type="button" class="link" id="backBtn">Use a different email</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
