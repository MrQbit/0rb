# RAK00N UI nginx config.
#
# Serves the static SPA from /usr/share/nginx/html and reverse-proxies
# the API surface to the rak00n-api Service. The upstream host is taken
# from $RAK00N_API_HOST (defaults to "rak00n-api" — the K8s service name).
#
# Override at deploy time:
#     env: RAK00N_API_HOST=rak00n-api.rak00n.svc.cluster.local
#          RAK00N_API_PORT=8080

server {
    listen 8080;
    # HTTPS with a self-signed cert → secure context for camera/mic on the LAN.
    listen 8443 ssl;
    ssl_certificate     /etc/nginx/certs/self.crt;
    ssl_certificate_key /etc/nginx/certs/self.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json image/svg+xml;

    # Security headers. The `add_header` directives have to be
    # repeated in any nested `location` that declares its own
    # `add_header` (nginx replaces rather than inherits the whole
    # set when a child block adds anything), so they are applied
    # here via a single include block referenced from each location.
    # We avoid creating a sub-file by inlining via nginx's `map`
    # pattern would require http-level config, which the chart does
    # not provide; instead, each conflicting location below repeats
    # the same six headers verbatim.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    access_log /dev/stdout combined;

    # Emit relative redirects (Location: /login.html, not http://host:8080/…)
    # so the gate redirect keeps the caller's real scheme/host/port.
    absolute_redirect off;

    # ── Dynamic upstream resolution ──
    # Docker's embedded DNS (127.0.0.11). Putting the upstream in a variable
    # forces nginx to re-resolve it per request instead of caching the IP at
    # startup — so when rak00n-api is recreated (new container IP), the proxy
    # follows it automatically. Without this, a recreate left nginx pointing at
    # a dead IP (connection refused → 502/500) until nginx was restarted.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api "rak00n-api:8080";
    set $avwebrtc "av-webrtc:8993";

    # ── Server-side auth gate ──
    # Internal subrequest target: the API returns 200 for a valid session,
    # 401 otherwise (200 always when auth is disabled). Used by auth_request
    # on the SPA shell so unauthenticated users never see the console.
    location = /__auth_check {
        internal;
        proxy_pass http://$api/v1/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }
    # Where auth_request sends unauthenticated shell requests.
    location @login_redirect { return 302 /login.html; }

    # Canvas iframe content — served from the API as
    # /v1/workspace/<sessionId>/.canvas/<file>. The default page CSP
    # blocks the CDN-loaded Tailwind/Chart.js/esm.sh imports that the
    # rak00n-core canvas starter templates use, so we relax the policy
    # for this path only. Isolation is preserved by the iframe sandbox
    # attribute (allow-scripts allow-same-origin allow-forms allow-popups)
    # and by frame-ancestors 'self' — the canvas can only be embedded
    # by the RAK00N console itself.
    #
    # The `^~` prefix tells nginx to stop looking for regex matches
    # once this prefix matches, so this block wins over the broader
    # `~ ^/(v1|...)` regex below.
    location ^~ /v1/workspace/ {
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_buffering off;
        proxy_cache off;
        # Drop the upstream CSP if any, then set our canvas-scoped one.
        proxy_hide_header Content-Security-Policy;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://esm.sh https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://esm.sh https://unpkg.com https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https://esm.sh https://cdn.jsdelivr.net https://cdn.tailwindcss.com https://unpkg.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # Published pages — PUBLIC shareable links (no auth gate). Proxies to the
    # API's public /v1/pub/<id>/ route. Relaxed CSP so the page's CDN libs work.
    location ^~ /pub/ {
        # Variable upstream can't auto-replace the location prefix, so map
        # /pub/<rest> → /v1/pub/<rest> explicitly before proxying.
        rewrite ^/pub/(.*)$ /v1/pub/$1 break;
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_hide_header Content-Security-Policy;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://esm.sh https://unpkg.com; style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src * data: blob:; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src *; frame-src https://www.youtube.com https://open.spotify.com https://sketchfab.com; object-src 'none'" always;
    }

    # Swagger UI — rak00n-api serves /docs as a small Swagger UI page that
    # loads swagger-ui-dist from unpkg and runs an inline init script.
    # Both are blocked by the default strict CSP, so we relax script-src
    # / style-src for this path. The Swagger UI is a read-only API
    # browser, runs against /openapi.json (same-origin), and is gated
    # behind frame-ancestors 'self' to prevent external embedding.
    location ^~ /docs {
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_buffering off;
        proxy_cache off;
        proxy_hide_header Content-Security-Policy;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # Voice WebSocket. The generic /v1 proxy below sets `Connection ''`
    # for SSE, which BREAKS the WS upgrade handshake, so the voice socket
    # needs its own block with the upgrade headers. An exact-match
    # (`location =`) has the highest priority, so it wins over the regex
    # block regardless of source order.
    location = /v1/voice/ws {
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering off;
    }

    # WebRTC signaling goes to the av-webrtc service, not the API.
    location = /v1/av/offer {
        proxy_pass http://$avwebrtc/offer;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Reverse proxy: API surface. Upstream is the rak00n-api Service
    # in the same namespace. nginx resolves this at startup using the
    # pod's /etc/resolv.conf (which kubernetes wires to kube-dns), so
    # we deliberately do NOT declare an explicit `resolver` block here.
    location ~ ^/(v1|a2a|healthz|metrics|docs|canvas|\.well-known)(/|$) {
        proxy_pass http://$api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';

        # SSE / long-polling friendliness
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        3600s;
        proxy_send_timeout        3600s;
        proxy_connect_timeout     10s;
        chunked_transfer_encoding off;
    }

    # Legacy `/web/*` paths from the monolith — map them to root files
    # so the SPA's existing `<link href="/web/styles.css">` etc. keep
    # working without HTML edits.
    location ^~ /web/ {
        rewrite ^/web/(.*)$ /$1 last;
    }

    # Cache static assets but ALWAYS revalidate. Our asset filenames are
    # not content-hashed (no bundler), so `immutable` made every UI deploy
    # invisible until a manual hard-refresh. `no-cache` keeps the bytes in
    # the browser cache but forces a conditional request (If-None-Match)
    # each load: nginx returns a cheap 304 when the ETag matches, or fresh
    # 200 bytes the instant an asset changes. We must repeat every header
    # from the parent block here because adding ANY add_header in a
    # location replaces (rather than appends to) the inherited set.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cache-Control "no-cache" always;
    }

    # Never cache the shell HTML. Same header-replication rule.
    # The orb shell renders typed widgets (charts, video embeds, thumbnails),
    # so its CSP allows media/img over https and youtube/vimeo frames.
    location = /index.html {
        auth_request /__auth_check;
        error_page 401 403 = @login_redirect;
        expires -1;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval' https://sdk.scdn.co; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' blob: https://api.spotify.com https://*.spotify.com wss://*.spotify.com https://*.scdn.co; media-src 'self' blob: https:; frame-src 'self' https://sdk.scdn.co https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://sketchfab.com https://www.openstreetmap.org https://codesandbox.io https://*.codesandbox.io https://open.spotify.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
    # Sign-in page — never cache (otherwise an old login.html lingers).
    # Its JS is in /login.js (external) so the strict script-src 'self' is fine.
    location = /login.html {
        expires -1;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }

    # SPA shell — every non-asset, non-API path falls back to index.html.
    # Gated: unauthenticated requests are redirected to the sign-in page
    # (server-side, so the console never flashes before the redirect).
    location / {
        auth_request /__auth_check;
        error_page 401 403 = @login_redirect;
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob: 'wasm-unsafe-eval' https://sdk.scdn.co; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' blob: https://api.spotify.com https://*.spotify.com wss://*.spotify.com https://*.scdn.co; media-src 'self' blob: https:; frame-src 'self' https://sdk.scdn.co https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://sketchfab.com https://www.openstreetmap.org https://codesandbox.io https://*.codesandbox.io https://open.spotify.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # Container health
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
