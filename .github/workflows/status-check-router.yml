# Status Check Router - Posts 'skipped' status for pipelines that don't match changed files
# This allows GitHub to see all required status checks as 'passed' without waiting for irrelevant pipelines
# Generated by GitHub Migration Tools
#
# Configuration is stored in .github/status-check-router-config.json

name: Status Check Router

on:
  pull_request:
    types: [opened, synchronize, reopened]
  repository_dispatch:
    types: [sync-pr-created]

permissions:
  statuses: write
  contents: read
  pull-requests: read

jobs:
  route-status-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Handle Sync PR Dispatch
        id: dispatch
        if: github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const configFile = '.github/status-check-router-config.json';
            if (!fs.existsSync(configFile)) {
              console.log('No status-check-router-config.json found');
              return;
            }
            const config = JSON.parse(fs.readFileSync(configFile, 'utf8'));
            const pipelines = config.pipelines;
            const sha = context.payload.client_payload.head_sha;
            const headRef = context.payload.client_payload.head_ref;
            const prNumber = context.payload.client_payload.pr_number;
            
            console.log(`Repository dispatch: sync-pr-created`);
            console.log(`  PR #${prNumber}, SHA: ${sha}, Branch: ${headRef}`);
            console.log(`Auto-skipping all ${pipelines.length} status checks for sync PR`);
            
            for (const pipeline of pipelines) {
              const checkName = pipeline.statusCheckName || pipeline.name;
              console.log(`  Marking '${checkName}' as success (skipped)`);
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: sha,
                state: 'success',
                context: checkName,
                description: 'Skipped - sync PR (already tested in source branch)'
              });
            }
            console.log('Done - all status checks marked as skipped for sync PR');

      - name: Get changed files
        id: changed-files
        if: github.event_name != 'repository_dispatch'
        run: |
          # Get the base and head refs for the PR
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          
          # Get list of changed files between base and head
          CHANGED_FILES=$(git diff --name-only $BASE_SHA $HEAD_SHA | tr '\n' ',' | sed 's/,$//')
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "Changed files: $CHANGED_FILES"

      - name: Route status checks
        if: github.event_name != 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Load pipeline configuration from JSON file
            const configPath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'status-check-router-config.json');
            if (!fs.existsSync(configPath)) {
              console.log('Config file not found, skipping status check routing');
              return;
            }
            const config = JSON.parse(fs.readFileSync(configPath, 'utf8'));
            const pipelines = config.pipelines;
            console.log(`Loaded ${pipelines.length} pipeline configurations`);

            // Check if this is a sync PR (created by release-sync workflow)
            const headRef = context.payload.pull_request.head.ref;
            const isSyncPR = headRef.startsWith('sync/');
            
            if (isSyncPR) {
              console.log('🔄 Sync PR detected: ' + headRef);
              console.log('Auto-skipping all status checks (code already tested in source branch)');
              
              const sha = context.payload.pull_request.head.sha;
              for (const pipeline of pipelines) {
                const checkName = pipeline.statusCheckName || pipeline.name;
                console.log(`  Marking '${checkName}' as skipped`);
                await github.rest.repos.createCommitStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  sha: sha,
                  state: 'success',
                  context: checkName,
                  description: 'Skipped - sync PR (already tested in source branch)'
                });
              }
              
              console.log(`\n=== Summary ===`);
              console.log(`Sync PR - all ${pipelines.length} status checks marked as skipped`);
              return;
            }

            // Get changed files from previous step
            const changedFilesStr = '${{ steps.changed-files.outputs.changed_files }}';
            const changedFiles = changedFilesStr ? changedFilesStr.split(',').filter(f => f.trim()) : [];
            console.log(`Changed files: ${changedFiles.length}`);
            changedFiles.slice(0, 20).forEach(f => console.log(`  - ${f}`));
            if (changedFiles.length > 20) console.log(`  ... and ${changedFiles.length - 20} more`);

            // Glob pattern matching function
            function matchesPattern(file, pattern) {
              // Handle common glob patterns
              // **/src/** should match: src/file.cs, sub/src/file.cs, a/b/src/c/file.cs
              
              // Simple check for **/X/** pattern - match X anywhere in path
              if (pattern.startsWith('**/') && pattern.endsWith('/**')) {
                const middle = pattern.slice(3, -3); // e.g., 'src' from '**/src/**'
                // Match if file contains /middle/ or starts with middle/
                if (file.includes('/' + middle + '/') || file.startsWith(middle + '/')) {
                  return true;
                }
              }
              
              // Handle **/X pattern (match X at any depth)
              if (pattern.startsWith('**/') && !pattern.endsWith('/**')) {
                const suffix = pattern.slice(3);
                if (file === suffix || file.endsWith('/' + suffix)) {
                  return true;
                }
              }
              
              // Handle X/** pattern (match anything under X)
              if (!pattern.startsWith('**/') && pattern.endsWith('/**')) {
                const prefix = pattern.slice(0, -3);
                if (file.startsWith(prefix + '/') || file === prefix) {
                  return true;
                }
              }
              
              // Fallback to regex-based matching
              let p = pattern;
              // Escape regex special chars (except *)
              p = p.replace(/\./g, '\\.'); // dots
              p = p.replace(/\+/g, '\\+'); // plus
              p = p.replace(/\^/g, '\\^'); // caret
              p = p.replace(/\$/g, '\\$'); // dollar
              p = p.replace(/\(/g, '\\('); // parens
              p = p.replace(/\)/g, '\\)');
              p = p.replace(/\{/g, '\\{'); // braces
              p = p.replace(/\}/g, '\\}');
              p = p.replace(/\|/g, '\\|'); // pipe
              // Handle **/ at start - matches any path prefix including none
              p = p.replace(/^\*\*\//g, '(.*\\/)?');
              // Handle /** at end - matches any path suffix
              p = p.replace(/\/\*\*$/g, '(\\/.*)?');
              // Handle remaining ** - matches any path segments
              p = p.replace(/\*\*/g, '.*');
              // Handle * - matches any single path segment (no slashes)
              p = p.replace(/\*/g, '[^/]*');
              const regexStr = '^' + p + '$';
              try {
                const regex = new RegExp(regexStr);
                return regex.test(file);
              } catch (e) {
                console.log(`Invalid regex from pattern '${pattern}': ${e.message}`);
                return false;
              }
            }

            // Debug: Test actual patterns from config against changed files
            console.log('\n=== Pattern Match Debug ===');
            pipelines.forEach(pipeline => {
              console.log(`Pipeline: ${pipeline.name}`);
              (pipeline.pathIncludes || []).forEach(pattern => {
                changedFiles.slice(0, 5).forEach(f => {
                  const result = matchesPattern(f, pattern);
                  console.log(`  '${f}' matches '${pattern}': ${result}`);
                });
              });
            });
            console.log('=== End Debug ===\n');

            function fileMatchesPipeline(file, pipeline) {
              if (!pipeline.pathIncludes || pipeline.pathIncludes.length === 0) return true;
              const matchesInclude = pipeline.pathIncludes.some(pattern => matchesPattern(file, pattern));
              if (!matchesInclude) return false;
              const matchesExclude = (pipeline.pathExcludes || []).some(pattern => matchesPattern(file, pattern));
              return !matchesExclude;
            }

            // Determine which pipelines are relevant
            const pipelineStatus = pipelines.map(pipeline => ({
              ...pipeline,
              isRelevant: changedFiles.some(file => fileMatchesPipeline(file, pipeline))
            }));

            const relevant = pipelineStatus.filter(p => p.isRelevant);
            const skipped = pipelineStatus.filter(p => !p.isRelevant);
            console.log(`\nRelevant pipelines (${relevant.length}): ${relevant.map(p => p.name).join(', ') || 'none'}`);
            console.log(`Skipped pipelines (${skipped.length}): ${skipped.map(p => p.name).join(', ') || 'none'}`);

            // Post 'success' status for skipped pipelines
            const sha = context.payload.pull_request.head.sha;
            for (const pipeline of skipped) {
              console.log(`Posting 'skipped' status for: ${pipeline.statusCheckName}`);
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: sha,
                state: 'success',
                context: pipeline.statusCheckName,
                description: 'Skipped - no relevant files changed'
              });
            }

            console.log(`\n=== Summary ===`);
            console.log(`Total pipelines: ${pipelines.length}`);
            console.log(`Relevant (ADO will run): ${relevant.length}`);
            console.log(`Skipped (marked as success): ${skipped.length}`);
