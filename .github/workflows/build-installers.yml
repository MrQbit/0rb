name: Build & Publish Installers

# Triggered by the the shared release workflow (Initial-release-creation.yaml)
# which handles enterprise SemVer bumping. This workflow:
#   1. Syncs package.json version to the release tag (single source of truth)
#   2. Builds the CLI with that version baked into MACRO.DISPLAY_VERSION
#   3. Builds macOS + Windows installer binaries with the same version
#   4. Builds & publishes the gRPC Docker image with the same version tag
#   5. Uploads all installer assets to the release
#
# Result: installer, internal CLI reference, and Docker image are all
# versioned identically and published together in a single run.
on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-installers:
    name: Build installer binaries
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Derive version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Derived version: $VERSION"

      - name: Sync package.json version to release tag
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf-8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json version set to', pkg.version);
          "

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Build CLI (with version baked in)
        run: bun run build

      - name: Build installers (macOS + Windows)
        run: bun run build:installers

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload installer assets to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/installers/orb2-installer-macos \
            dist/installers/orb2-installer-windows.exe \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append install instructions to release notes
        run: |
          TAG="${{ github.event.release.tag_name }}"
          CURRENT_BODY=$(gh release view "$TAG" --json body -q .body)
          APPEND=$(cat <<EOF

          ## Downloads
          - **macOS**: \`orb2-installer-macos\`
          - **Windows**: \`orb2-installer-windows.exe\`

          ## One-line install (macOS/Linux)
          \`\`\`bash
          gh release download -R orb2-ai/orb2 -p "orb2-installer-macos" -D /tmp --clobber && chmod +x /tmp/orb2-installer-macos && /tmp/orb2-installer-macos && rm /tmp/orb2-installer-macos && source ~/.zshrc
          \`\`\`

          ## One-line install (Windows PowerShell)
          \`\`\`powershell
          gh release download -R orb2-ai/orb2 -p "orb2-installer-windows.exe" -D \$env:TEMP --clobber; & "\$env:TEMP\\orb2-installer-windows.exe"
          \`\`\`

          Build: ${{ steps.sha.outputs.short }}
          EOF
          )
          printf '%s\n%s\n' "$CURRENT_BODY" "$APPEND" | gh release edit "$TAG" --notes-file -
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-grpc-docker:
    name: Build gRPC Docker image
    runs-on: ubuntu-latest
    needs: build-installers
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Sync package.json version to release tag
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf-8'));
            pkg.version = '${{ needs.build-installers.outputs.version }}';
            fs.writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gRPC image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.grpc
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/orb2-grpc:latest
            ghcr.io/${{ github.repository }}/orb2-grpc:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository }}/orb2-grpc:v${{ needs.build-installers.outputs.version }}
            ghcr.io/${{ github.repository }}/orb2-grpc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
