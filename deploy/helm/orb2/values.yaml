global:
  imageRepository: localhost:5001/orb2-api
  imageTag: dev
  imagePullPolicy: Always
  imagePullSecrets: []
  namespace: orb2
  # Internal cluster registry (k3d-orb2-registry:5001 → localhost:5001 from host)
  registry: localhost:5001

# ── vLLM: local LLM inference (DEFAULT provider) ──────────────────
vllm:
  enabled: true
  image: vllm/vllm-openai:latest
  imagePullPolicy: IfNotPresent
  model: Qwen/Qwen3-Coder-Next
  servedModelName: qwen3-coder-next
  tensorParallelSize: 1
  maxModelLen: 32768
  gpuMemoryUtilization: "0.90"
  quantization: ""
  extraArgs: []
  huggingfaceToken: ""
  runtimeClassName: ""
  nodeSelector: {}
  tolerations: []
  volumes:
    - name: hf-cache
      hostPath:
        path: /raid/.cache/huggingface
        type: DirectoryOrCreate
  volumeMounts:
    - name: hf-cache
      mountPath: /root/.cache/huggingface
  resources:
    requests:
      cpu: "2"
      memory: 16Gi
    limits:
      cpu: "8"
      memory: 64Gi
      # nvidia.com/gpu: 1  # uncomment when GPU operator is installed

# ── Auth (single user, no auth required) ──────────────────────────
auth:
  required: false
  bootstrapToken: ""
  bootstrapAdminKey: ""
  corsOrigins: "*"

# ── RBAC (cluster control for worker Jobs, canvas/sandbox Pods, self-update) ──
rbac:
  create: true
  serviceAccountName: orb2-api
  # Cluster-wide read for the operator/diagnostics tool. Namespace-scoped
  # control (Jobs/Pods/Deployment patch) is always granted when create=true.
  clusterWide: false

# ── Docker host control (DockerOps tool) ──────────────────────────
# SECURITY: mounting the host docker socket grants effective root on the
# Spark. Off by default. Enable only on a trusted single-user host.
dockerOps:
  enabled: false
  socketPath: /var/run/docker.sock

# ── Router (orb2 API) ───────────────────────────────────────────
router:
  # 2+ replicas so self-update can roll one pod at a time behind the Service.
  replicas: 2
  maxConcurrentStreams: 0
  sessionTtlSeconds: 604800  # 7 days for personal use
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  hpa:
    enabled: false
  # Agent runs inside the cluster and must reach the K8s API to spawn
  # workers/canvas pods and to self-update.
  allowK8sApiEgress: true
  extraEgressRules: []
  maxBodyMb: 10
  rateLimit:
    enabled: false
    limits: {}
  # Rolling update tuned for blue-green self-update with 2 replicas.
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# ── Redis ─────────────────────────────────────────────────────────
redis:
  enabled: true
  image: redis:7-alpine
  password: ""
  memory: 256Mi
  persistence:
    enabled: true
    size: 1Gi

# ── LLM Providers ────────────────────────────────────────────────
# Default: local vLLM. Foundry is available as fallback if configured.
llm:
  defaultProvider: local
  # Local vLLM (OpenAI-compatible)
  local:
    baseUrl: "http://orb2-vllm.orb2.svc.cluster.local:8000/v1"
    model: qwen3-coder-next
    helperModel: qwen3-coder-next
    apiKey: "local"
    provider: "vllm"
  # Anthropic Foundry (optional fallback)
  foundry:
    enabled: false
    resource: ""
    baseUrl: ""
    apiKey: ""
    defaultModel: claude-sonnet-4-6
    defaultChatModel: ""

# ── Voice (continuous speech: GPU STT + neural TTS, orb2 is the brain) ──
# STT (faster-whisper) and TTS (Kokoro) run as host GPU services reached
# over the k3d gateway IP, mirroring how the API reaches local vLLM. See
# services/stt, services/tts and scripts/start-voice-gpu.sh.
voice:
  enabled: true
  backend: whisper          # whisper backend = orb2/Qwen answers (the brain)
  sttUrl: "http://172.20.0.1:8990"
  ttsUrl: "http://172.20.0.1:8991"
  ttsVoice: "af_heart"

# ── Sandbox (code execution + self-update build/test pod) ─────────
sandbox:
  enabled: true

# ── Worker (k8s Job hand-off for long-running tasks) ──────────────
worker:
  enabled: true
  ttlSecondsAfterFinished: 300
  activeDeadlineSeconds: 600

# ── Features ──────────────────────────────────────────────────────
features:
  skills:
    enabled: true

# ── MCP defaults ──────────────────────────────────────────────────
mcps:
  defaults:
    enabled: false

# ── UI (frontend console) ─────────────────────────────────────────
ui:
  enabled: true
  replicas: 1
  image:
    repository: localhost:5001/orb2-ui
    tag: dev
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Ingress ───────────────────────────────────────────────────────
ingress:
  enabled: false

# ── Files ─────────────────────────────────────────────────────────
files:
  enabled: true
  root: "/workspace/orb2-files"
  maxBytesPerFile: 104857600  # 100MB
  quotaBytesPerSession: 1073741824  # 1GB
  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi
    claimName: orb2-files
    size: 5Gi

# ── Unused platform features (off) ───────────────────────────────
relay:
  enabled: false
vault:
  enabled: false
rabbitmq:
  enabled: false
tenant:
  id: ""
discovery:
  enabled: false
agents:
  fsRoot: ""
canvas:
  enabled: true
  image: "localhost:5001/orb2-canvas:dev"
  imagePullPolicy: Always
github:
  app:
    enabled: false
  oauth:
    clientId: ""
logUserContent: true

# ── MCP server token ─────────────────────────────────────────────
mcp:
  serverToken: ""
