apiVersion: v1
kind: Service
metadata:
  name: orb2-api
  namespace: {{ include "orb2.namespace" . }}
  labels:
    {{- include "orb2.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "orb2.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: router
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
