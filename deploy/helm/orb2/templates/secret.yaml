apiVersion: v1
kind: Secret
metadata:
  name: orb2-secrets
  namespace: {{ include "orb2.namespace" . }}
  labels:
    {{- include "orb2.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.llm .Values.llm.foundry .Values.llm.foundry.apiKey }}
  ANTHROPIC_FOUNDRY_API_KEY: {{ .Values.llm.foundry.apiKey | quote }}
  {{- end }}
  {{- if and .Values.vllm .Values.vllm.huggingfaceToken }}
  HF_TOKEN: {{ .Values.vllm.huggingfaceToken | quote }}
  {{- end }}
  {{- if .Values.mcp.serverToken }}
  MCP_SERVER_TOKEN: {{ .Values.mcp.serverToken | quote }}
  {{- end }}
  {{- if .Values.auth.bootstrapToken }}
  ORB2_API_BOOTSTRAP_TOKEN: {{ .Values.auth.bootstrapToken | quote }}
  {{- end }}
  {{- if .Values.auth.bootstrapAdminKey }}
  ORB2_BOOTSTRAP_ADMIN_KEY: {{ .Values.auth.bootstrapAdminKey | quote }}
  {{- end }}
  {{- if .Values.redis.password }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- end }}
  {{- if and .Values.relay.enabled .Values.relay.eventSecret }}
  ORB2_RELAY_EVENT_SECRET: {{ .Values.relay.eventSecret | quote }}
  {{- end }}
  {{- if and .Values.vault.enabled .Values.vault.token }}
  VAULT_TOKEN: {{ .Values.vault.token | quote }}
  {{- end }}
