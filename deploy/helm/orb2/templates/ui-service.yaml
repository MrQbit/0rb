{{- if .Values.ui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: orb2-ui
  namespace: {{ include "orb2.namespace" . }}
  labels:
    {{- include "orb2.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type | default "ClusterIP" }}
  selector:
    {{- include "orb2.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  ports:
    - name: http
      port: {{ .Values.ui.service.port | default 80 }}
      targetPort: http
      protocol: TCP
{{- end }}
