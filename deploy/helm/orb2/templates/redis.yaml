{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orb2-redis
  namespace: {{ include "orb2.namespace" . }}
  labels:
    {{- include "orb2.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: orb2-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orb2-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orb2-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - {{ .Values.redis.memory | replace "Gi" "gb" | replace "Mi" "mb" | replace "Ki" "kb" }}
            - --maxmemory-policy
            - allkeys-lru
            {{- if .Values.redis.password }}
            - --requirepass
            - {{ .Values.redis.password | quote }}
            {{- end }}
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: {{ .Values.redis.memory }}
            limits:
              cpu: 500m
              memory: {{ .Values.redis.memory }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
          {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: orb2-redis
  namespace: {{ include "orb2.namespace" . }}
  labels:
    {{- include "orb2.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: orb2-redis
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
