apiVersion: v1
kind: ConfigMap
metadata:
  name: rak00n-config
  namespace: {{ include "rak00n.namespace" . }}
  labels:
    {{- include "rak00n.labels" . | nindent 4 }}
data:
  RAK00N_API_PORT: "8080"
  RAK00N_API_HOST: "0.0.0.0"
  RAK00N_API_WORKSPACE_ROOT: "/workspace"
  RAK00N_API_AUTH_REQUIRED: {{ .Values.auth.required | ternary "1" "0" | quote }}
  RAK00N_API_MAX_STREAMS: {{ .Values.router.maxConcurrentStreams | quote }}
  RAK00N_API_SESSION_TTL: {{ .Values.router.sessionTtlSeconds | quote }}
  RAK00N_STANDALONE: "1"
  RAK00N_ENVIRONMENT: {{ .Values.global.environment | default "dev" | quote }}
  {{- if and .Values.mcps .Values.mcps.defaults (not (default true .Values.mcps.defaults.enabled)) }}
  RAK00N_DEFAULT_MCPS_DISABLED: "1"
  {{- end }}
  {{- if and .Values.llm (eq .Values.llm.defaultProvider "local") }}
  # Local vLLM (OpenAI-compatible) — default provider
  RAK00N_USE_OPENAI: "1"
  RAK00N_SECRET_SOURCE: "env"
  LLM_ENDPOINT: {{ .Values.llm.local.baseUrl | quote }}
  LLM_KEY: {{ .Values.llm.local.apiKey | default "local" | quote }}
  LLM_DEPLOYMENT_NAME: {{ .Values.llm.local.model | quote }}
  LLM_MODEL: {{ .Values.llm.local.model | quote }}
  LLM_PROVIDER: {{ .Values.llm.local.provider | default "vllm" | quote }}
  OPENAI_BASE_URL: {{ .Values.llm.local.baseUrl | quote }}
  OPENAI_MODEL: {{ .Values.llm.local.model | quote }}
  RAK00N_DEFAULT_MODEL: {{ .Values.llm.local.model | quote }}
  RAK00N_HELPER_MODEL: {{ .Values.llm.local.helperModel | default .Values.llm.local.model | quote }}
  {{- else }}
  RAK00N_USE_FOUNDRY: "1"
  {{- end }}
  {{- if and .Values.llm .Values.llm.foundry .Values.llm.foundry.enabled }}
  # Foundry is available as fallback
  RAK00N_FOUNDRY_AVAILABLE: "1"
  {{- end }}
  NODE_ENV: "production"
  AGENT_ID: "rak00n-api"
  {{- if .Values.router.maxBodyMb }}
  RAK00N_API_MAX_BODY_MB: {{ .Values.router.maxBodyMb | quote }}
  {{- end }}
  {{- if .Values.router.rateLimit.enabled }}
  RAK00N_RATELIMIT_ENABLED: "1"
  {{- range $k, $v := .Values.router.rateLimit.limits }}
  RAK00N_RATELIMIT_{{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.sandbox.enabled }}
  RAK00N_SANDBOX_MODE: "pod"
  RAK00N_SANDBOX_URL: "http://rak00n-sandbox:9091"
  {{- end }}
  {{/*
    Foundry endpoint: baseUrl and resource are mutually exclusive in
    the Anthropic SDK ("API Error: baseURL and resource are mutually
    exclusive"). Prefer baseUrl when both are set so explicit
    overrides win; otherwise fall back to the resource shorthand.
  */}}
  {{- if and .Values.llm .Values.llm.foundry .Values.llm.foundry.enabled }}
  {{- if .Values.llm.foundry.baseUrl }}
  ANTHROPIC_FOUNDRY_BASE_URL: {{ .Values.llm.foundry.baseUrl | quote }}
  {{- else if .Values.llm.foundry.resource }}
  ANTHROPIC_FOUNDRY_RESOURCE: {{ .Values.llm.foundry.resource | quote }}
  {{- end }}
  {{- if .Values.llm.foundry.defaultModel }}
  ANTHROPIC_DEFAULT_SONNET_MODEL: {{ .Values.llm.foundry.defaultModel | quote }}
  {{- end }}
  {{- if .Values.llm.foundry.defaultChatModel }}
  ANTHROPIC_FOUNDRY_CHAT_MODEL: {{ .Values.llm.foundry.defaultChatModel | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  REDIS_URL: {{ include "rak00n.redisUrl" . | quote }}
  {{- end }}
  {{- if .Values.auth.corsOrigins }}
  RAK00N_CORS_ORIGINS: {{ .Values.auth.corsOrigins | quote }}
  {{- end }}
  {{- if .Values.logUserContent }}
  RAK00N_LOG_USER_CONTENT: "true"
  {{- end }}
  {{- if .Values.rabbitmq.enabled }}
  RABBITMQ_URL: {{ .Values.rabbitmq.url | quote }}
  RABBITMQ_INPUT_QUEUE: {{ .Values.rabbitmq.inputQueue | quote }}
  RABBITMQ_OUTPUT_QUEUE: {{ .Values.rabbitmq.outputQueue | quote }}
  {{- end }}
  {{- if .Values.relay.enabled }}
  RAK00N_RELAY_URL: {{ .Values.relay.url | quote }}
  {{- if .Values.relay.instanceId }}
  RAK00N_INSTANCE_ID: {{ .Values.relay.instanceId | quote }}
  {{- end }}
  {{- if .Values.relay.memorySync }}
  RAK00N_RELAY_MEMORY_SYNC: "true"
  {{- end }}
  {{- end }}
  {{- if .Values.tenant.id }}
  RAK00N_TENANT_ID: {{ .Values.tenant.id | quote }}
  {{- end }}
  RAK00N_SKILLS_ENABLED: {{ .Values.features.skills.enabled | ternary "1" "0" | quote }}
  {{- if .Values.discovery.enabled }}
  RAK00N_DISCOVERY_PATHS: {{ .Values.discovery.paths | quote }}
  RAK00N_DISCOVERY_GIT_ALLOWED_ORG: {{ .Values.discovery.emuOrg | quote }}
  {{- if .Values.discovery.cacheDir }}
  RAK00N_DISCOVERY_CACHE_DIR: {{ .Values.discovery.cacheDir | quote }}
  {{- end }}
  RAK00N_DISCOVERY_REFRESH_SECONDS: {{ .Values.discovery.refreshSeconds | quote }}
  {{- end }}
  {{- if .Values.agents.fsRoot }}
  RAK00N_AGENT_FS_ROOT: {{ .Values.agents.fsRoot | quote }}
  {{- end }}
  {{- if .Values.files }}
  RAK00N_FILES_ENABLED: {{ ternary "1" "0" (default true .Values.files.enabled) | quote }}
  {{- if .Values.files.root }}
  RAK00N_FILES_ROOT: {{ .Values.files.root | quote }}
  {{- end }}
  {{- if .Values.files.maxBytesPerFile }}
  RAK00N_FILES_MAX_BYTES: {{ .Values.files.maxBytesPerFile | int64 | quote }}
  {{- end }}
  {{- if .Values.files.quotaBytesPerSession }}
  RAK00N_FILES_QUOTA_BYTES: {{ .Values.files.quotaBytesPerSession | int64 | quote }}
  {{- end }}
  {{- if .Values.files.persistence.enabled }}
  RAK00N_WORKER_FILES_PVC: {{ .Values.files.persistence.existingClaim | default .Values.files.persistence.claimName | default "rak00n-files" | quote }}
  RAK00N_WORKER_FILES_MOUNT_PATH: {{ .Values.files.root | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.github .Values.github.app .Values.github.app.enabled }}
  GITHUB_APP_ID: {{ .Values.github.app.appId | quote }}
  GITHUB_APP_INSTALLATION_ID: {{ .Values.github.app.installationId | quote }}
  {{- if .Values.github.app.apiBase }}
  GITHUB_APP_API_BASE: {{ .Values.github.app.apiBase | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.github .Values.github.oauth .Values.github.oauth.clientId }}
  GITHUB_DEVICE_FLOW_CLIENT_ID: {{ .Values.github.oauth.clientId | quote }}
  {{- end }}
  {{- if .Values.vault.enabled }}
  VAULT_ADDR: {{ .Values.vault.addr | quote }}
  VAULT_AUTH_METHOD: {{ .Values.vault.authMethod | quote }}
  VAULT_ROLE: {{ .Values.vault.role | quote }}
  VAULT_SECRET_MOUNT: {{ .Values.vault.secretMount | quote }}
  VAULT_SECRET_PREFIX: {{ .Values.vault.secretPrefix | quote }}
  {{- if .Values.vault.namespace }}
  VAULT_NAMESPACE: {{ .Values.vault.namespace | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.voice .Values.voice.enabled }}
  # Voice: continuous STT→rak00n(Qwen)→TTS with barge-in. STT/TTS are GPU
  # host services; the whisper backend keeps rak00n as the answering brain.
  RAK00N_VOICE_ENABLED: "1"
  RAK00N_VOICE_BACKEND: {{ .Values.voice.backend | default "whisper" | quote }}
  {{- if .Values.voice.sttUrl }}
  RAK00N_STT_URL: {{ .Values.voice.sttUrl | quote }}
  {{- end }}
  {{- if .Values.voice.ttsUrl }}
  RAK00N_TTS_URL: {{ .Values.voice.ttsUrl | quote }}
  {{- end }}
  {{- if .Values.voice.ttsVoice }}
  RAK00N_TTS_VOICE: {{ .Values.voice.ttsVoice | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.canvas.enabled }}
  RAK00N_CANVAS_ENABLED: "1"
  {{- if .Values.canvas.image }}
  RAK00N_CANVAS_IMAGE: {{ .Values.canvas.image | quote }}
  RAK00N_CANVAS_IMAGE_PULL_POLICY: {{ .Values.canvas.imagePullPolicy | default .Values.global.imagePullPolicy | quote }}
  {{- end }}
  {{- end }}
