{{- if .Values.vllm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rak00n-vllm
  namespace: {{ include "rak00n.namespace" . }}
  labels:
    {{- include "rak00n.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rak00n-vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rak00n-vllm
    spec:
      containers:
        - name: vllm
          image: {{ .Values.vllm.image }}
          imagePullPolicy: {{ .Values.vllm.imagePullPolicy | default "IfNotPresent" }}
          args:
            - --model
            - {{ .Values.vllm.model | quote }}
            - --served-model-name
            - {{ .Values.vllm.servedModelName | default .Values.vllm.model | quote }}
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --tensor-parallel-size
            - {{ .Values.vllm.tensorParallelSize | default 1 | quote }}
            {{- if .Values.vllm.maxModelLen }}
            - --max-model-len
            - {{ .Values.vllm.maxModelLen | quote }}
            {{- end }}
            {{- if .Values.vllm.gpuMemoryUtilization }}
            - --gpu-memory-utilization
            - {{ .Values.vllm.gpuMemoryUtilization | quote }}
            {{- end }}
            {{- if .Values.vllm.quantization }}
            - --quantization
            - {{ .Values.vllm.quantization | quote }}
            {{- end }}
            {{- range .Values.vllm.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- if .Values.vllm.huggingfaceToken }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rak00n-secrets
                  key: HF_TOKEN
            {{- end }}
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}
          {{- if .Values.vllm.volumeMounts }}
          volumeMounts:
            {{- toYaml .Values.vllm.volumeMounts | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
      {{- if .Values.vllm.volumes }}
      volumes:
        {{- toYaml .Values.vllm.volumes | nindent 8 }}
      {{- end }}
      {{- if .Values.vllm.runtimeClassName }}
      runtimeClassName: {{ .Values.vllm.runtimeClassName | quote }}
      {{- end }}
      {{- if .Values.vllm.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.vllm.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.vllm.tolerations }}
      tolerations:
        {{- toYaml .Values.vllm.tolerations | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: rak00n-vllm
  namespace: {{ include "rak00n.namespace" . }}
  labels:
    {{- include "rak00n.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rak00n-vllm
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
{{- end }}
