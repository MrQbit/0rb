apiVersion: v1
kind: Service
metadata:
  name: rak00n-api
  namespace: {{ include "rak00n.namespace" . }}
  labels:
    {{- include "rak00n.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "rak00n.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: router
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
