{{- if and .Values.files .Values.files.persistence .Values.files.persistence.enabled (not .Values.files.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.files.persistence.claimName | default "rak00n-files" }}
  namespace: {{ include "rak00n.namespace" . }}
  labels:
    {{- include "rak00n.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.files.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.files.persistence.size | default "5Gi" }}
  {{- if .Values.files.persistence.storageClass }}
  storageClassName: {{ .Values.files.persistence.storageClass }}
  {{- end }}
{{- end }}
