# SearXNG config for orb2 — a private metasearch backend for the WebSearch
# tool (no API key). Internal only (not published); the agent queries it at
# http://searxng:8080/search?...&format=json. The secret is injected from the
# SEARXNG_SECRET env (the image replaces "ultrasecretkey").
use_default_settings: true

general:
  instance_name: "orb2 search"
  donation_url: false
  privacypolicy_url: false

server:
  secret_key: "ultrasecretkey"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  # Enable the JSON API the WebSearch tool consumes.
  formats:
    - html
    - json

engines:
  - name: wikipedia
    disabled: false
